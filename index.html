<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로웰어 번역기</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --accent: #7b6cf6;
      --accent2: #a78bfa;
      --text: #e2e0ff;
      --sub: #8b8aaa;
      --border: #2e2e4a;
      --input-bg: #13131f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .subtitle { color: var(--sub); font-size: 0.9rem; margin-bottom: 36px; }

    .container {
      width: 100%;
      max-width: 860px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(123,108,246,0.1);
    }

    /* Mode tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--sub);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      border-color: var(--accent);
      background: rgba(123,108,246,0.12);
      color: var(--accent2);
      font-weight: 600;
    }

    /* Panels */
    .panels {
      display: flex;
      gap: 16px;
      align-items: stretch;
    }
    .panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .panel label { font-size: 0.78rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }

    textarea {
      flex: 1;
      width: 100%;
      height: 200px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.1rem;
      padding: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.7;
    }
    textarea:focus { border-color: var(--accent); }

    .output-box {
      flex: 1;
      width: 100%;
      height: 200px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--accent2);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-y: auto;
    }

    .mid-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-top: 24px;
    }
    .arrow { font-size: 1.8rem; color: var(--accent); }

    .copy-btn {
      align-self: flex-end;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--sub);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .clear-btn {
      align-self: flex-start;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--sub);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #f87171; color: #f87171; }

    /* Reference */
    .ref-section {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }
    .ref-title { font-size: 0.78rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
      gap: 7px;
    }
    .ref-item {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .ref-item:hover { border-color: var(--accent); }
    .ref-item .lw { color: var(--accent2); font-size: 1.15rem; }
    .ref-item .lt { color: var(--sub); font-size: 0.72rem; margin-top: 2px; }

    .example-row {
      margin-top: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: var(--sub);
    }
    .example-row span { color: var(--accent2); }

    @media (max-width: 580px) {
      .panels { flex-direction: column; }
      .mid-col { flex-direction: row; padding-top: 0; }
    }
  </style>
</head>
<body>
  <h1>로웰어 번역기</h1>
  <p class="subtitle">English ↔ Lowell Language Translator</p>

  <div class="container">
    <div class="tabs">
      <button class="tab active" id="tab-enc" onclick="setMode('encode')">영어 → 로웰어</button>
      <button class="tab" id="tab-dec" onclick="setMode('decode')">로웰어 → 영어</button>
    </div>

    <div class="panels">
      <div class="panel">
        <label id="lbl-in">영어 입력</label>
        <textarea id="input-text" placeholder="영어를 입력하세요..." oninput="doTranslate()"></textarea>
        <button class="clear-btn" onclick="clearInput()">지우기</button>
      </div>
      <div class="mid-col">
        <div class="arrow">→</div>
      </div>
      <div class="panel">
        <label id="lbl-out">로웰어 출력</label>
        <div class="output-box" id="output-text"></div>
        <button class="copy-btn" onclick="copyOutput()">복사</button>
      </div>
    </div>

    <div class="ref-section">
      <div class="ref-title">문자 참조표 — 클릭하면 입력창에 삽입</div>
      <div class="ref-grid" id="ref-grid"></div>
      <div class="example-row">
        예시: <span>ħᛖłłᛟ ᚹħᛖᚱᛖ ᚨᚱᛖ ᛃᛟᚢ.</span> = "hello where are you."
      </div>
    </div>
  </div>

<script>
const CONSONANTS = {
  b:'ᛒ', c:'ⵏ', d:'đ', f:'ᚠ', g:'ᚷ', h:'ħ', j:'ʝ', k:'ƙ',
  l:'ł', m:'ᛗ', n:'ŋ', p:'ƥ', q:'ⵕ', r:'ᚱ', s:'ʃ', t:'ŧ',
  v:'ʋ', w:'ᚹ', x:'ⵥ', y:'ᛃ', z:'ƶ'
};
const VOWELS = {
  ae:'ᚫ', oi:'ᛜ',
  a:'ᚨ', e:'ᛖ', i:'ᛁ', o:'ᛟ', u:'ᚢ'
};

// Reverse map: lowell → latin
const LOWELL_TO_LATIN = {};
Object.entries(CONSONANTS).forEach(([l,lw]) => LOWELL_TO_LATIN[lw] = l);
Object.entries(VOWELS).forEach(([l,lw]) => LOWELL_TO_LATIN[lw] = l);
const LOWELL_ENTRIES = Object.entries(LOWELL_TO_LATIN).sort((a,b) => b[0].length - a[0].length);

function encodeLowell(text) {
  let result = '';
  let i = 0;
  const lower = text.toLowerCase();
  while (i < lower.length) {
    const two = lower.slice(i, i+2);
    if (VOWELS[two])            { result += VOWELS[two];       i += 2; }
    else if (VOWELS[lower[i]])  { result += VOWELS[lower[i]];  i++;    }
    else if (CONSONANTS[lower[i]]) { result += CONSONANTS[lower[i]]; i++; }
    else { result += text[i]; i++; }  // spaces, punctuation, numbers → keep as-is
  }
  return result;
}

function decodeLowell(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const [lw, latin] of LOWELL_ENTRIES) {
      if (text.startsWith(lw, i)) {
        result += latin;
        i += lw.length;
        matched = true;
        break;
      }
    }
    if (!matched) { result += text[i]; i++; }
  }
  return result;
}

// ── Mode ──
let mode = 'encode';

function setMode(m) {
  mode = m;
  document.getElementById('tab-enc').classList.toggle('active', m === 'encode');
  document.getElementById('tab-dec').classList.toggle('active', m === 'decode');
  const isEnc = m === 'encode';
  document.getElementById('lbl-in').textContent  = isEnc ? '영어 입력'   : '로웰어 입력';
  document.getElementById('lbl-out').textContent = isEnc ? '로웰어 출력' : '영어 출력';
  document.getElementById('input-text').placeholder = isEnc
    ? '영어를 입력하세요...'
    : '로웰어를 입력하세요 (예: ħᛖłłᛟ)';
  document.getElementById('input-text').value = '';
  document.getElementById('output-text').textContent = '';
  // Update ref-grid click behavior label
  buildRefGrid();
}

function doTranslate() {
  const input = document.getElementById('input-text').value;
  const out = mode === 'encode' ? encodeLowell(input) : decodeLowell(input);
  document.getElementById('output-text').textContent = out;
}

function clearInput() {
  document.getElementById('input-text').value = '';
  document.getElementById('output-text').textContent = '';
}

function copyOutput() {
  const text = document.getElementById('output-text').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}

// ── Reference grid (click to insert) ──
function buildRefGrid() {
  const grid = document.getElementById('ref-grid');
  grid.innerHTML = '';

  // In encode mode show latin→lowell; in decode mode show lowell→latin
  const isEnc = mode === 'encode';
  const all = [
    ...Object.entries(CONSONANTS),
    ...Object.entries(VOWELS),
  ];

  all.forEach(([latin, lowell]) => {
    const div = document.createElement('div');
    div.className = 'ref-item';
    // Top = what you insert, bottom = what it becomes
    div.innerHTML = isEnc
      ? `<div class="lw">${lowell}</div><div class="lt">${latin}</div>`
      : `<div class="lw">${lowell}</div><div class="lt">${latin}</div>`;
    div.title = isEnc ? `클릭: "${latin}" 입력` : `클릭: "${lowell}" 입력`;
    div.onclick = () => {
      const ta = document.getElementById('input-text');
      const insert = isEnc ? latin : lowell;
      const start = ta.selectionStart;
      const end   = ta.selectionEnd;
      ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
      ta.selectionStart = ta.selectionEnd = start + insert.length;
      ta.focus();
      doTranslate();
    };
    grid.appendChild(div);
  });
}

buildRefGrid();
</script>
</body>
</html>
